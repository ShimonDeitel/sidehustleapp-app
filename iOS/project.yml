name: Sidehustle
options:
  bundleIdPrefix: com.shimondeitel.sidehustleapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sidehustle:
    type: application
    platform: iOS
    sources:
      - path: Sidehustle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sidehustleapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sidehustle/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SidehustleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SidehustleTests
      - path: Sidehustle.storekit
    dependencies:
      - target: Sidehustle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sidehustleapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SidehustleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SidehustleUITests
    dependencies:
      - target: Sidehustle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sidehustleapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sidehustle:
    build:
      targets:
        Sidehustle: all
        SidehustleTests: [test]
        SidehustleUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sidehustle.storekit
    test:
      config: Debug
      storeKitConfiguration: Sidehustle.storekit
      targets:
        - SidehustleTests
        - SidehustleUITests
    archive:
      config: Release
